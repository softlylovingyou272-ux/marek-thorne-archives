<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Archives - Marek Thorne</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #242b27; 
      --card-bg: #1a2e24; 
      --text-light: #f0eee9; 
      --text-muted: #a3b8ad; 
      --accent-bright-green: #2a6b4a; 
      --accent-gold: #c49c66; 
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-light);
      font-family: 'Lora', serif;
      line-height: 1.7;
      text-align: center;
      padding: 50px 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      color: var(--accent-gold);
      margin-bottom: 20px;
    }

    p {
      max-width: 600px;
      margin: 0 auto 40px auto;
      font-size: 18px;
    }

    .form-container {
      background-color: var(--card-bg);
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      border: 1px solid #111;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-radius: 4px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      color: var(--accent-gold);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }
    
    .back-link:hover {
      color: var(--text-light);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← Return to the Archives</a>

  <h1>Unlock the Dark Archives</h1>
  <p>Join the inner circle to receive exclusive short stories, early cover reveals, and updates whenever a new nightmare is unleashed.</p>

  <div class="form-container">
    
    <iframe src="https://marekthornesnewsletter.substack.com/embed" width="100%" height="150" style="border: 1px solid #111; background: white; border-radius: 4px;" frameborder="0" scrolling="no"></iframe>

  </div>

</body>
</html>
